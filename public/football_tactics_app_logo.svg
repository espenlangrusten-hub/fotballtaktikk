      .dash{stroke:url(#greenGrad);stroke-width:17;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:22 28;filter:url(#glow);}
      .arrow{stroke:url(#greenGrad);stroke-width:17;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow);}
